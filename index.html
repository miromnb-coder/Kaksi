<!doctype html>
<html lang="fi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#050608" />
    <title>Halo AI</title>
    <style>
      :root{
        --bg:#050608;
        --bg2:#0b0d12;
        --line:rgba(255,255,255,.10);
        --line2:rgba(255,255,255,.14);
        --card:rgba(255,255,255,.07);
        --card2:rgba(255,255,255,.10);
        --text:#f5f7fb;
        --muted:rgba(245,247,251,.70);
        --muted2:rgba(245,247,251,.48);
        --accent:#7f73ff;
        --accent2:#4fe3ff;
        --good:#5ef08f;
        --warn:#ffd86b;
      }

      *{ box-sizing:border-box; }
      html,body{
        margin:0;
        min-height:100%;
        background:
          radial-gradient(circle at top, rgba(127,115,255,.22), transparent 28%),
          radial-gradient(circle at right, rgba(79,227,255,.14), transparent 22%),
          linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%);
        color:var(--text);
        font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }
      body{ min-height:100svh; }

      .app{
        min-height:100svh;
        display:flex;
        flex-direction:column;
        gap:12px;
        padding:16px 14px calc(14px + env(safe-area-inset-bottom));
        position:relative;
        overflow:hidden;
      }

      .glow{
        position:fixed;
        inset:-20% auto auto 50%;
        width:80vw;
        height:80vw;
        transform:translateX(-50%);
        pointer-events:none;
        background:radial-gradient(circle, rgba(127,115,255,.18), transparent 60%);
        filter:blur(30px);
      }

      .topbar{
        position:relative;
        z-index:1;
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap:12px;
      }

      .brand{
        display:flex;
        align-items:center;
        gap:12px;
      }

      .logo{
        width:14px;
        height:14px;
        border-radius:50%;
        background:linear-gradient(135deg, var(--accent), var(--accent2));
        box-shadow:0 0 24px rgba(127,115,255,.6);
        flex:0 0 auto;
      }

      .brandText{
        display:flex;
        flex-direction:column;
        gap:3px;
      }

      .brandTitle{
        font-weight:800;
        font-size:18px;
        letter-spacing:.2px;
        line-height:1;
      }

      .status{
        display:flex;
        align-items:center;
        gap:6px;
        font-size:12px;
        color:var(--muted);
      }

      .dot{
        width:7px;
        height:7px;
        border-radius:50%;
        background:var(--good);
        box-shadow:0 0 12px rgba(94,240,143,.45);
      }

      .dot.busy{
        background:var(--warn);
        box-shadow:0 0 12px rgba(255,216,107,.45);
      }

      .btn{
        border:1px solid var(--line);
        background:rgba(255,255,255,.06);
        color:var(--text);
        border-radius:999px;
        padding:10px 14px;
        font-size:13px;
        font-weight:600;
        backdrop-filter:blur(18px);
        -webkit-backdrop-filter:blur(18px);
      }

      .hero{
        position:relative;
        z-index:1;
        display:flex;
        align-items:flex-start;
        justify-content:space-between;
        gap:14px;
        border:1px solid var(--line);
        background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.05));
        border-radius:28px;
        padding:18px;
        box-shadow:0 18px 50px rgba(0,0,0,.28);
        backdrop-filter:blur(22px);
        -webkit-backdrop-filter:blur(22px);
      }

      .eyebrow{
        font-size:11px;
        color:var(--muted2);
        letter-spacing:.16em;
        text-transform:uppercase;
        margin-bottom:10px;
      }

      .headline{
        font-size:24px;
        line-height:1.05;
        font-weight:900;
        letter-spacing:-.02em;
        margin:0 0 10px;
      }

      .subline{
        color:var(--muted);
        font-size:14px;
        line-height:1.45;
        max-width:280px;
      }

      .switchWrap{
        display:flex;
        align-items:center;
        gap:10px;
        user-select:none;
        font-size:13px;
        color:var(--muted);
        white-space:nowrap;
        margin-top:2px;
      }

      .switch{
        position:relative;
        width:48px;
        height:28px;
        flex:0 0 auto;
      }

      .switch input{ display:none; }

      .track{
        position:absolute;
        inset:0;
        border-radius:999px;
        background:rgba(255,255,255,.16);
        transition:.2s ease;
      }

      .thumb{
        position:absolute;
        width:22px;
        height:22px;
        top:3px;
        left:3px;
        border-radius:50%;
        background:#fff;
        transition:.2s ease;
      }

      .switch input:checked + .track{
        background:linear-gradient(135deg, var(--accent), var(--accent2));
      }

      .switch input:checked + .track .thumb{
        transform:translateX(20px);
      }

      .cameraShell{
        position:relative;
        z-index:1;
        border:1px solid var(--line);
        background:rgba(255,255,255,.06);
        border-radius:30px;
        overflow:hidden;
        min-height:320px;
        box-shadow:0 18px 50px rgba(0,0,0,.28);
        backdrop-filter:blur(18px);
        -webkit-backdrop-filter:blur(18px);
      }

      .cameraVideo{
        width:100%;
        height:100%;
        min-height:320px;
        object-fit:cover;
        display:block;
        background:#000;
      }

      .cameraOverlay{
        position:absolute;
        inset:0;
        pointer-events:none;
        background:
          linear-gradient(transparent 0 46%, rgba(127,115,255,.13) 47%, transparent 48%),
          linear-gradient(90deg, transparent 0 46%, rgba(79,227,255,.10) 47%, transparent 48%);
      }

      .cameraFrame{
        position:absolute;
        inset:16px;
        border-radius:22px;
        border:1px solid rgba(255,255,255,.16);
        box-shadow:inset 0 0 0 1px rgba(255,255,255,.04);
      }

      .cameraHud{
        position:absolute;
        top:14px;
        left:14px;
        right:14px;
        display:flex;
        align-items:flex-start;
        justify-content:space-between;
        gap:10px;
        pointer-events:none;
      }

      .hudPill{
        pointer-events:none;
        border:1px solid rgba(255,255,255,.12);
        background:rgba(0,0,0,.24);
        backdrop-filter:blur(16px);
        -webkit-backdrop-filter:blur(16px);
        padding:10px 12px;
        border-radius:16px;
        font-size:12px;
        color:var(--text);
        display:flex;
        align-items:center;
        gap:8px;
      }

      .hudMini{
        color:var(--muted);
        font-size:11px;
      }

      .hudDot{
        width:8px;
        height:8px;
        border-radius:50%;
        background:var(--good);
        box-shadow:0 0 12px rgba(94,240,143,.45);
      }

      .cameraControls{
        position:absolute;
        left:14px;
        right:14px;
        bottom:14px;
        display:flex;
        gap:10px;
        z-index:2;
      }

      .glassBtn{
        flex:1;
        border:1px solid rgba(255,255,255,.12);
        background:rgba(0,0,0,.32);
        color:var(--text);
        border-radius:18px;
        padding:12px 14px;
        font-size:13px;
        font-weight:700;
        backdrop-filter:blur(16px);
        -webkit-backdrop-filter:blur(16px);
      }

      .glassBtn.primary{
        background:linear-gradient(135deg, rgba(127,115,255,.8), rgba(79,227,255,.72));
        color:#050608;
      }

      .chips{
        position:relative;
        z-index:1;
        display:flex;
        gap:10px;
        overflow-x:auto;
        padding-bottom:2px;
        scrollbar-width:none;
      }
      .chips::-webkit-scrollbar{ display:none; }

      .chip{
        flex:0 0 auto;
        border:1px solid var(--line);
        background:rgba(255,255,255,.05);
        color:var(--text);
        border-radius:999px;
        padding:10px 14px;
        font-size:13px;
        white-space:nowrap;
      }

      .selectedImageCard{
        position:relative;
        z-index:1;
        display:flex;
        align-items:center;
        gap:12px;
        padding:12px;
        border-radius:20px;
        background:rgba(255,255,255,.06);
        border:1px solid rgba(255,255,255,.08);
      }

      .selectedImage{
        width:54px;
        height:54px;
        border-radius:14px;
        object-fit:cover;
      }

      .removeImage{
        margin-left:auto;
        background:transparent;
        color:rgba(255,255,255,.8);
        border:none;
        font-size:13px;
      }

      .chat{
        position:relative;
        z-index:1;
        flex:1;
        display:flex;
        flex-direction:column;
        gap:12px;
        overflow:auto;
        padding:4px 0 6px;
      }

      .row{
        display:flex;
        align-items:flex-end;
        gap:10px;
      }

      .row.user{ justify-content:flex-end; }
      .row.assistant{ justify-content:flex-start; }

      .avatar{
        width:30px;
        height:30px;
        border-radius:50%;
        display:grid;
        place-items:center;
        font-size:12px;
        font-weight:800;
        flex:0 0 auto;
      }

      .avatar.user{
        color:#050608;
        background:linear-gradient(135deg, var(--accent), var(--accent2));
      }

      .avatar.assistant{
        background:rgba(255,255,255,.08);
        color:var(--text);
      }

      .bubble{
        max-width:min(84%, 560px);
        border-radius:22px;
        border:1px solid var(--line);
        padding:14px 14px 12px;
        backdrop-filter:blur(18px);
        -webkit-backdrop-filter:blur(18px);
        box-shadow:0 12px 30px rgba(0,0,0,.18);
        overflow:hidden;
      }

      .bubble.user{
        background:linear-gradient(135deg, rgba(127,115,255,.22), rgba(79,227,255,.12));
        border-top-right-radius:8px;
      }

      .bubble.assistant{
        background:rgba(255,255,255,.06);
        border-top-left-radius:8px;
      }

      .text{
        white-space:pre-wrap;
        line-height:1.48;
        font-size:15px;
        letter-spacing:.01em;
      }

      .imgPreview{
        width:100%;
        max-height:220px;
        object-fit:cover;
        border-radius:16px;
        margin-bottom:10px;
        border:1px solid rgba(255,255,255,.08);
      }

      .actions{
        display:flex;
        gap:8px;
        margin-top:10px;
      }

      .mini{
        border:1px solid var(--line);
        background:rgba(255,255,255,.06);
        color:var(--text);
        border-radius:999px;
        padding:7px 10px;
        font-size:12px;
      }

      .typing{
        width:fit-content;
        display:inline-flex;
        gap:6px;
        align-items:center;
        padding:14px 16px;
        border-radius:18px;
        background:rgba(255,255,255,.06);
        border:1px solid var(--line);
      }

      .typing span{
        width:7px;
        height:7px;
        border-radius:50%;
        background:rgba(255,255,255,.8);
        animation:bounce 1s infinite ease-in-out;
      }

      .typing span:nth-child(2){ animation-delay:.15s; }
      .typing span:nth-child(3){ animation-delay:.3s; }

      @keyframes bounce{
        0%, 80%, 100%{ transform:translateY(0); opacity:.5; }
        40%{ transform:translateY(-5px); opacity:1; }
      }

      .footerRow{
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap:10px;
        color:var(--muted2);
        font-size:12px;
        padding:0 4px;
      }

      .errorTag{ color:#ff9b9b; }

      .composer{
        position:relative;
        z-index:1;
        display:flex;
        align-items:flex-end;
        gap:10px;
        border:1px solid var(--line);
        background:rgba(255,255,255,.08);
        border-radius:24px;
        padding:12px;
        backdrop-filter:blur(22px);
        -webkit-backdrop-filter:blur(22px);
        box-shadow:0 18px 50px rgba(0,0,0,.24);
      }

      .plus, .send{
        width:46px;
        height:46px;
        border:0;
        border-radius:50%;
        flex:0 0 auto;
        display:grid;
        place-items:center;
        font-size:18px;
        cursor:pointer;
      }

      .plus{
        background:rgba(255,255,255,.08);
        color:var(--text);
      }

      .send{
        background:linear-gradient(135deg, var(--accent), var(--accent2));
        color:#050608;
        font-weight:900;
      }

      .send:disabled{
        opacity:.55;
        cursor:not-allowed;
      }

      .input{
        flex:1;
        border:1px solid rgba(255,255,255,.08);
        background:rgba(0,0,0,.22);
        color:var(--text);
        border-radius:18px;
        min-height:46px;
        max-height:140px;
        padding:13px 14px;
        resize:none;
        outline:none;
        font-size:16px;
        line-height:1.4;
      }

      .input::placeholder{ color:var(--muted2); }

      @media (max-width:420px){
        .headline{ font-size:22px; }
        .bubble{ max-width:88%; }
      }
    </style>
  </head>
  <body>
    <div class="glow"></div>
    <main class="app">
      <header class="topbar">
        <div class="brand">
          <div class="logo"></div>
          <div class="brandText">
            <div class="brandTitle">Halo AI</div>
            <div class="status"><span id="statusDot" class="dot"></span><span id="statusText">Valmis</span></div>
          </div>
        </div>
        <button id="clearBtn" class="btn">Clear</button>
      </header>

      <section class="hero">
        <div>
          <div class="eyebrow">Noa-style assistant</div>
          <h1 class="headline">Puhu, kuvaa, näe.</h1>
          <div class="subline">
            Tumma HUD-käyttöliittymä, live-kamera, nopeat vastaukset ja ääneen lukeminen.
          </div>
        </div>

        <label class="switchWrap" title="Auto speak">
          <span>Auto speak</span>
          <label class="switch">
            <input id="autoSpeak" type="checkbox" checked />
            <span class="track"><span class="thumb"></span></span>
          </label>
        </label>
      </section>

      <section class="cameraShell">
        <video id="cameraVideo" class="cameraVideo" autoplay playsinline muted></video>
        <div class="cameraOverlay"></div>
        <div class="cameraFrame"></div>

        <div class="cameraHud">
          <div class="hudPill">
            <span class="hudDot"></span>
            <span>
              <div style="font-weight:700; line-height:1;">Live camera</div>
              <div class="hudMini" id="cameraStatus">Ei käynnissä</div>
            </span>
          </div>

          <div class="hudPill" style="align-items:flex-start;">
            <span>
              <div style="font-weight:700; line-height:1;">Noa HUD</div>
              <div class="hudMini">capture + analyze</div>
            </span>
          </div>
        </div>

        <div class="cameraControls">
          <button id="startCameraBtn" class="glassBtn">Start</button>
          <button id="flipCameraBtn" class="glassBtn">Flip</button>
          <button id="captureBtn" class="glassBtn primary">Capture</button>
        </div>
      </section>

      <section class="chips" aria-label="Quick prompts">
        <button class="chip" data-prompt="Kerro mitä näet.">Kerro mitä näet</button>
        <button class="chip" data-prompt="Tiivistä tämä lyhyesti.">Tiivistä</button>
        <button class="chip" data-prompt="Lue kaikki teksti kuvasta.">Lue teksti</button>
        <button class="chip" data-prompt="Mikä on tärkein asia tästä?">Tärkein asia</button>
      </section>

      <div id="selectedImageCard" class="selectedImageCard" style="display:none">
        <img id="selectedImage" class="selectedImage" alt="Preview" />
        <button id="removeImage" class="removeImage">Remove image</button>
      </div>

      <section id="chat" class="chat" aria-live="polite"></section>

      <div id="typing" class="typing" style="display:none">
        <span></span><span></span><span></span>
      </div>

      <div class="footerRow">
        <span id="countText">0 viestiä</span>
        <span id="errorText" class="errorTag"></span>
      </div>

      <footer class="composer">
        <button id="plusBtn" class="plus" title="Lisää kuva">⊕</button>
        <input id="imageInput" type="file" accept="image/*" capture="environment" hidden />
        <textarea id="input" class="input" rows="1" placeholder="Mitä kuuluu?"></textarea>
        <button id="sendBtn" class="send">→</button>
      </footer>
    </main>

    <script>
      const chatEl = document.getElementById("chat");
      const inputEl = document.getElementById("input");
      const sendBtn = document.getElementById("sendBtn");
      const plusBtn = document.getElementById("plusBtn");
      const imageInput = document.getElementById("imageInput");
      const clearBtn = document.getElementById("clearBtn");
      const autoSpeakEl = document.getElementById("autoSpeak");
      const typingEl = document.getElementById("typing");
      const statusDot = document.getElementById("statusDot");
      const statusText = document.getElementById("statusText");
      const countText = document.getElementById("countText");
      const errorText = document.getElementById("errorText");
      const selectedImageCard = document.getElementById("selectedImageCard");
      const selectedImage = document.getElementById("selectedImage");
      const removeImage = document.getElementById("removeImage");
      const cameraVideo = document.getElementById("cameraVideo");
      const cameraStatus = document.getElementById("cameraStatus");
      const startCameraBtn = document.getElementById("startCameraBtn");
      const flipCameraBtn = document.getElementById("flipCameraBtn");
      const captureBtn = document.getElementById("captureBtn");

      const STORAGE_KEY = "halo_ai_chat_v2";
      const MAX_HISTORY = 12;

      let messages = loadMessages();
      let imageBase64 = "";
      let stream = null;
      let facingMode = "environment";
      let cameraReady = false;

      function defaultMessages() {
        return [{ role: "assistant", text: "Hei. Kysy jotain tai ota kuva." }];
      }

      function loadMessages() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return defaultMessages();
          const parsed = JSON.parse(raw);
          if (!Array.isArray(parsed) || !parsed.length) return defaultMessages();
          return parsed;
        } catch {
          return defaultMessages();
        }
      }

      function saveMessages() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(messages));
      }

      function setBusy(isBusy, label) {
        typingEl.style.display = isBusy ? "inline-flex" : "none";
        statusDot.classList.toggle("busy", isBusy);
        statusText.textContent = label || (isBusy ? "Ajattelee…" : "Valmis");
        sendBtn.disabled = isBusy;
        plusBtn.disabled = isBusy;
        startCameraBtn.disabled = isBusy;
        flipCameraBtn.disabled = isBusy;
        captureBtn.disabled = isBusy;
      }

      function scrollToBottom() {
        requestAnimationFrame(() => {
          window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
        });
      }

      function escapeHtml(str) {
        return String(str)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function speak(text) {
        if (!("speechSynthesis" in window)) return;
        const t = String(text || "").trim();
        if (!t) return;
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(t);
        utterance.lang = "fi-FI";
        utterance.rate = 1.02;
        utterance.pitch = 1;
        window.speechSynthesis.speak(utterance);
      }

      function render() {
        chatEl.innerHTML = "";
        countText.textContent = `${messages.length} viestiä`;

        if (!messages.length) {
          chatEl.innerHTML = `
            <div class="empty">
              <strong>Valmis.</strong>
              Aloita kirjoittamalla viesti.
            </div>
          `;
          return;
        }

        for (let i = 0; i < messages.length; i++) {
          const m = messages[i];
          const isUser = m.role === "user";

          const row = document.createElement("div");
          row.className = `row ${isUser ? "user" : "assistant"}`;

          if (!isUser) {
            const avatar = document.createElement("div");
            avatar.className = "avatar assistant";
            avatar.textContent = "N";
            row.appendChild(avatar);
          }

          const bubble = document.createElement("div");
          bubble.className = `bubble ${isUser ? "user" : "assistant"}`;

          if (isUser && m.imageBase64) {
            const img = document.createElement("img");
            img.className = "imgPreview";
            img.src = m.imageBase64;
            img.alt = "Preview";
            bubble.appendChild(img);
          }

          const text = document.createElement("div");
          text.className = "text";
          text.innerHTML = escapeHtml(m.text).replace(/\n/g, "<br>");
          bubble.appendChild(text);

          if (!isUser) {
            const actions = document.createElement("div");
            actions.className = "actions";

            const copyBtn = document.createElement("button");
            copyBtn.className = "mini";
            copyBtn.textContent = "Copy";
            copyBtn.onclick = async () => {
              try {
                await navigator.clipboard.writeText(m.text);
              } catch {}
            };

            const speakBtn = document.createElement("button");
            speakBtn.className = "mini";
            speakBtn.textContent = "Speak";
            speakBtn.onclick = () => speak(m.text);

            actions.appendChild(copyBtn);
            actions.appendChild(speakBtn);
            bubble.appendChild(actions);
          }

          row.appendChild(bubble);

          if (isUser) {
            const avatar = document.createElement("div");
            avatar.className = "avatar user";
            avatar.textContent = "M";
            row.appendChild(avatar);
          }

          chatEl.appendChild(row);
        }
      }

      function autoGrow() {
        inputEl.style.height = "auto";
        inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + "px";
      }

      async function startCamera() {
        try {
          if (stream) {
            stream.getTracks().forEach((t) => t.stop());
          }

          stream = await navigator.mediaDevices.getUserMedia({
            video: {
              facingMode: { ideal: facingMode }
            },
            audio: false
          });

          cameraVideo.srcObject = stream;
          cameraReady = true;
          cameraStatus.textContent = facingMode === "environment" ? "Takakamera valmis" : "Etukamera valmis";
        } catch (err) {
          cameraReady = false;
          cameraStatus.textContent = "Kamera ei auennut";
          errorText.textContent = "Kameralupa puuttuu tai kamera ei ole käytettävissä";
        }
      }

      function captureFrame() {
        if (!cameraReady || !cameraVideo.videoWidth || !cameraVideo.videoHeight) return "";

        const canvas = document.createElement("canvas");
        const maxW = 1280;
        const scale = Math.min(1, maxW / cameraVideo.videoWidth);
        canvas.width = Math.round(cameraVideo.videoWidth * scale);
        canvas.height = Math.round(cameraVideo.videoHeight * scale);

        const ctx = canvas.getContext("2d");
        ctx.drawImage(cameraVideo, 0, 0, canvas.width, canvas.height);
        return canvas.toDataURL("image/jpeg", 0.82);
      }

      function setImagePreview(dataUrl) {
        imageBase64 = dataUrl || "";
        if (imageBase64) {
          selectedImage.src = imageBase64;
          selectedImageCard.style.display = "flex";
        } else {
          selectedImageCard.style.display = "none";
          selectedImage.src = "";
        }
      }

      async function sendMessage(customText) {
        const text = String(customText ?? inputEl.value).trim();
        if (!text && !imageBase64) return;

        errorText.textContent = "";

        const userMsg = {
          role: "user",
          text: text || "Mitä kuvassa näkyy?",
          imageBase64: imageBase64 || "",
        };

        messages.push(userMsg);
        render();
        saveMessages();
        inputEl.value = "";
        autoGrow();
        scrollToBottom();

        const sendingImage = !!imageBase64;
        setImagePreview("");
        setBusy(true, sendingImage ? "Analysoi kuvaa…" : "Ajattelee…");

        const history = messages
          .slice(-MAX_HISTORY)
          .map((m) => ({
            role: m.role,
            content: m.text,
          }));

        try {
          const res = await fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              message: text,
              imageBase64: userMsg.imageBase64,
              history,
            }),
          });

          const data = await res.json();

          if (!res.ok || data.error) {
            const err = data.error ? JSON.stringify(data.error) : `HTTP ${res.status}`;
            messages.push({ role: "assistant", text: `ERROR: ${err}` });
            errorText.textContent = "Backend-virhe";
          } else {
            const reply = data.reply || "Ei vastausta.";
            messages.push({ role: "assistant", text: reply });
            if (autoSpeakEl.checked) speak(reply);
          }

          render();
          saveMessages();
          scrollToBottom();
        } catch (err) {
          messages.push({ role: "assistant", text: `ERROR: ${err.message || String(err)}` });
          errorText.textContent = "Verkkovirhe";
          render();
          saveMessages();
        } finally {
          setBusy(false, "Valmis");
        }
      }

      inputEl.addEventListener("input", autoGrow);

      inputEl.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });

      sendBtn.addEventListener("click", () => sendMessage());
      plusBtn.addEventListener("click", () => imageInput.click());

      imageInput.addEventListener("change", async (e) => {
        const file = e.target.files && e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = () => {
          setImagePreview(String(reader.result || ""));
          if (!inputEl.value.trim()) inputEl.value = "Kerro mitä näet.";
          autoGrow();
          inputEl.focus();
        };
        reader.readAsDataURL(file);
        imageInput.value = "";
      });

      removeImage.addEventListener("click", () => setImagePreview(""));

      clearBtn.addEventListener("click", () => {
        messages = defaultMessages();
        saveMessages();
        render();
        errorText.textContent = "";
        statusText.textContent = "Valmis";
        setImagePreview("");
      });

      document.querySelectorAll("[data-prompt]").forEach((btn) => {
        btn.addEventListener("click", () => sendMessage(btn.dataset.prompt));
      });

      startCameraBtn.addEventListener("click", startCamera);

      flipCameraBtn.addEventListener("click", async () => {
        facingMode = facingMode === "environment" ? "user" : "environment";
        await startCamera();
      });

      captureBtn.addEventListener("click", () => {
        const shot = captureFrame();
        if (!shot) {
          errorText.textContent = "Kameraa ei ole vielä käynnistetty";
          return;
        }
        setImagePreview(shot);
        if (!inputEl.value.trim()) inputEl.value = "Kerro mitä näet.";
        autoGrow();
      });

      // Start camera automatically when possible
      if (navigator.mediaDevices?.getUserMedia) {
        startCamera();
      } else {
        cameraStatus.textContent = "Kameraa ei tueta";
      }

      render();
      saveMessages();
      autoGrow();
      scrollToBottom();
    </script>
  </body>
</html>
